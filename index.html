<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 PRO BROADCAST | GIANT SCREEN LEADERBOARD</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Flip.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #00f2ff;
            --gold: #ffdf00;
            --silver: #e2e8f0;
            --bronze: #b45309;
            --card-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image:
                    radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.1) 0%, transparent 40%),
                    radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                    linear-gradient(to bottom, #020617, #0f172a);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 2vh 2vw; /* Відносні відступи для всього екрану */
            overflow: hidden; /* Приховуємо скролл, щоб все вмістилося */
            display: flex;
            flex-direction: column;
        }
        
        .container {
            width: 100%;
            height: 100%; /* Займаємо всю доступну висоту */
            margin: 0 auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        header { text-align: center; margin-bottom: 3vh; } /* Відносний відступ */
        
        .broadcast-badge {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            padding: 0.5vh 1.5vw;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(0.8rem, 1.5vh, 1.2rem); /* Відносний розмір шрифту */
            letter-spacing: 3px;
            margin-bottom: 1vh;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            text-transform: uppercase;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vh, 4rem); /* Відносний розмір шрифту */
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* PODIUM */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 2vw; /* Відносний відступ */
            margin-bottom: 3vh; /* Відносний відступ */
            min-height: 35vh; /* Відносна мінімальна висота */
        }
        
        .team-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5vw; /* Відносний радіус */
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Podium Classes */
        .is-podium { width: 22vw; padding: 2.5vh 1.5vw; } /* Відносні розміри та відступи */
        .is-podium.rank-1 {
            width: 26vw;
            padding: 4vh 2vw;
            border: 0.3vh solid var(--gold); /* Відносна товщина бордера */
            border-top: 1.2vh solid var(--gold); /* Відносна товщина бордера */
            box-shadow: 0 0 50px rgba(255, 223, 0, 0.2), 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            order: 2;
            z-index: 5;
        }
        .is-podium.rank-2 { border-top: 0.8vh solid var(--silver); order: 1; } /* Відносна товщина бордера */
        .is-podium.rank-3 { border-top: 0.8vh solid var(--bronze); order: 3; } /* Відносна товщина бордера */
        
        .medal-icon { display: none; }
        .is-podium .medal-icon {
            display: flex; position: absolute;
            top: -2.5vh; left: 50%; transform: translateX(-50%);
            width: 4.5vw; height: 4.5vw; /* Відносний розмір */
            max-width: 80px; max-height: 80px; /* Обмеження для дуже великих екранів */
            background: var(--bg);
            border-radius: 50%; align-items: center; justify-content: center;
            font-size: clamp(1.8rem, 3.5vh, 2.5rem); /* Відносний розмір шрифту */
            border: 0.3vh solid var(--glass-border); /* Відносна товщина бордера */
            z-index: 10;
        }
        .rank-1 .medal-icon { border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 223, 0, 0.5); }
        
        .logo-box {
            background: #fff; border-radius: 50%; margin: 0 auto; padding: 0.4vw; /* Відносний відступ */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .is-podium .logo-box { width: 7vw; height: 7vw; margin-bottom: 1.5vh; } /* Відносний розмір та відступ */
        .is-podium.rank-1 .logo-box { width: 9vw; height: 9vw; border: 0.4vh solid var(--gold); } /* Відносний розмір та бордер */
        .logo-img { width: 100%; height: 100%; object-fit: contain; }
        
        .team-name { font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem, 2.5vh, 2rem); font-weight: 700; text-transform: uppercase; } /* Відносний розмір шрифту */
        .rank-1 .team-name { color: var(--gold); font-size: clamp(1.8rem, 3.2vh, 2.5rem); } /* Відносний розмір шрифту */
        
        .points-val { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 5vh, 4rem); font-weight: 900; color: var(--accent); } /* Відносний розмір шрифту */
        .rank-1 .points-val { font-size: clamp(4rem, 6.5vh, 5.5rem); background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } /* Відносний розмір шрифту */
        
        /* MULTI-COLUMN LIST */
        .leader-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(30vw, 1fr)); /* Автоматична кількість колонок, мінімум 30vw */
            gap: 1vh 1.5vw; /* Відносні відступи */
            padding-bottom: 1vh;
            flex-grow: 1; /* Займає весь доступний простір */
            overflow: hidden; /* Приховуємо скролл */
        }
        
        /* На дуже широких екранах може бути 3 колонки */
        @media (min-width: 1600px) {
            .leader-list { grid-template-columns: repeat(auto-fit, minmax(25vw, 1fr)); }
        }
        
        .is-list {
            display: grid;
            grid-template-columns: 3vw 4vw 1fr 7vw; /* Відносні розміри колонок */
            align-items: center;
            padding: 1vh 1vw; /* Відносні відступи */
            border-radius: 0.8vw; /* Відносний радіус */
            border-left: 0.4vw solid var(--accent); /* Відносна товщина бордера */
            text-align: left;
            background: var(--card-bg);
        }
        
        .row-pos { display: none; font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 2vh, 1.8rem); opacity: 0.4; font-weight: 900; } /* Відносний розмір шрифту */
        .is-list .row-pos { display: block; }
        .is-list .logo-box { width: 3vw; height: 3vw; margin: 0; padding: 0.3vw; } /* Відносний розмір та відступ */
        .is-list .team-name { padding-left: 1vw; font-size: clamp(1.2rem, 2.2vh, 1.6rem); color: #fff; } /* Відносний розмір шрифту */
        .is-list .points-val { text-align: right; font-size: clamp(1.6rem, 2.8vh, 2.2rem); color: var(--accent); font-weight: 900; } /* Відносний розмір шрифту */
        
        /* Мобільні медіа-запити видалено за запитом */
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="broadcast-badge">Live Championship</div>
        <h1>Live Leaderboard</h1>
    </header>
    
    <div id="podium-container" class="podium"></div>
    <div id="list-container" class="leader-list"></div>
</div>

<script>
    gsap.registerPlugin(Flip);
    
    const API_URL = 'https://script.google.com/macros/s/AKfycbyN679clzeACEZWULyHo93KXIhA1yoj8ywL4TdbBo0IgYudD1DCUrL90RKQ5uytA2T3/exec';
    const REFRESH_RATE = 2000;
    let previousData = [];
    const teamElements = {};
    
    function formatLogo(val) {
        if (!val || val.length < 5) return 'https://ui-avatars.com/api/?background=333&color=fff&name=?';
        const driveMatch = val.match(/[-\w]{25,}/);
        if (driveMatch && (val.includes('drive.google.com') || val.length < 100)) {
            return `https://drive.google.com/thumbnail?id=${driveMatch[0]}&sz=w200`;
        }
        return val;
    }
    
    async function update() {
        let data = [];
        try {
            if (!API_URL || API_URL.includes('ВАШ_APPS_SCRIPT')) {
                data = getMockData();
            } else {
                const res = await fetch(API_URL);
                data = await res.json();
            }
            
            if (JSON.stringify(data) === JSON.stringify(previousData)) return;
            
            const state = Flip.getState(".team-card");
            render(data);
            
            Flip.from(state, {
                duration: 1.2,
                ease: "expo.inOut",
                stagger: {
                    amount: 0.3,
                    from: "start"
                },
                scale: true,
                onEnter: elements => gsap.fromTo(elements, {opacity: 0, scale: 0.5}, {opacity: 1, scale: 1, duration: 0.6}),
                onLeave: elements => gsap.to(elements, {opacity: 0, scale: 0, duration: 0.4, onComplete: () => elements.forEach(el => el.remove())})
            });
            
            previousData = data;
        } catch (e) { console.error("Update error:", e); }
    }
    
    function render(data) {
        const podContainer = document.getElementById('podium-container');
        const listContainer = document.getElementById('list-container');
        const medals = ['🥇', '🥈', '🥉'];
        
        // Очищаємо контейнери перед додаванням елементів, щоб Flip міг коректно відстежити переміщення
        podContainer.innerHTML = '';
        listContainer.innerHTML = '';
        
        data.forEach((team, index) => {
            let el = teamElements[team.name];
            
            if (!el) {
                el = document.createElement('div');
                el.className = 'team-card';
                el.setAttribute('data-flip-id', team.name);
                el.innerHTML = `
                    <div class="medal-icon"></div>
                    <div class="row-pos"></div>
                    <div class="logo-box"><img src="${formatLogo(team.logo)}" class="logo-img"></div>
                    <div class="team-name">${team.name}</div>
                    <div class="points-val">${team.points}</div>
                `;
                teamElements[team.name] = el;
            }
            
            el.querySelector('.points-val').innerText = team.points;
            el.classList.remove('is-podium', 'is-list', 'rank-1', 'rank-2', 'rank-3');
            
            if (index < 3) {
                el.classList.add('is-podium', `rank-${index + 1}`);
                el.querySelector('.medal-icon').innerText = medals[index];
                podContainer.appendChild(el);
            } else {
                el.classList.add('is-list');
                el.querySelector('.row-pos').innerText = index + 1;
                listContainer.appendChild(el);
            }
        });
    }
    
    function getMockData() {
        // Генеруємо 30 команд для тесту сітки
        const names = ["Cyber Lions", "Neon Phantoms", "Vortex Gaming", "Titan Squad", "Alpha Elite", "Solaris", "Luna Strike", "Zenith", "Red Dragons", "Blue Hawks", "Silver Fox", "Iron Wolves", "Green Hornets", "Night Owls", "Swift Falcons", "Ghost Riders", "Apex Predators", "Storm Breakers", "Shadow Ninjas", "Fire Birds", "Golden Eagles", "Mystic Wolves", "Dark Knights", "Star Gazers", "Thunderbolts", "Crimson Tide", "Emerald Blades", "Frost Giants", "Desert Scorpions", "Ocean Breakers"];
        return names.map(name => ({
            name: name,
            points: Math.floor(Math.random() * 200),
            logo: ""
        })).sort((a,b) => b.points - a.points);
    }
    
    update();
    setInterval(update, REFRESH_RATE);
</script>

</body>
</html>
