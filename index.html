<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<title>Live Табло</title>
	
	<style>
		body {
			margin: 0;
			font-family: Arial;
			color: #ffffff;
			overflow-x: hidden;
			
			background: #0b1220; /* темний стабільний фон */
		}
		
		body::before {
			content: "";
			position: fixed;
			width: 600px;
			height: 600px;
			background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 60%);
			top: -200px;
			left: -200px;
			animation: floatGlow 10s ease-in-out infinite;
			pointer-events: none;
		}
		
		@keyframes floatGlow {
			0% { transform: translate(0,0); }
			50% { transform: translate(200px, 150px); }
			100% { transform: translate(0,0); }
		}
		
		@keyframes bgMove {
			0% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
			100% { background-position: 0% 50%; }
		}
		
		/* заголовок */
		h1 {
			text-align: center;
			margin: 20px;
			letter-spacing: 2px;
		}
		
		/* TOP 3 */
		.top3 {
			display: flex;
			justify-content: center;
			gap: 25px;
			margin: 30px 0;
		}
		
		/* картки */
		.card {
			width: 220px;
			height: 260px;
			border-radius: 18px;
			text-align: center;
			padding: 15px;
			
			background: #111827;
			border: 1px solid #1f2937;
			
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
		}
		
		.first {
			border: 2px solid gold;
		}
		
		.second {
			border: 2px solid silver;
		}
		
		.third {
			border: 2px solid #cd7f32;
		}
		
		/* список */
		.list {
			width: 85%;
			margin: 0 auto 40px auto;
		}
		
		/* рядки */
		.row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			
			padding: 14px 18px;
			margin: 10px auto;
			
			width: 85%;
			border-radius: 12px;
			
			background: #111827; /* чистий темний */
			border: 1px solid #1f2937;
			
			transition: transform 0.5s ease, opacity 0.3s ease;
		}
		
		.team {
			display: flex;
			align-items: center;
			gap: 12px;
		}
		
		.team img {
			width: 42px;
			height: 42px;
			border-radius: 50%;
		}
	</style>
</head>

<body>

<h1 style="text-align:center;">🏆 LIVE TOURNAMENT</h1>

<div class="top3" id="top3"></div>
<div class="list" id="list"></div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>

    const API = "https://script.google.com/macros/s/AKfycbyN679clzeACEZWULyHo93KXIhA1yoj8ywL4TdbBo0IgYudD1DCUrL90RKQ5uytA2T3/exec";

    let prevOrder = [];
    let oldPositions = {};
    let prevState = [];

    async function load() {
        const res = await fetch(API + "?t=" + Date.now());
        const data = await res.json();

        data.sort((a,b)=>b.points-a.points);

        const changed = hasChanged(data);

        renderTop3(data.slice(0,3));
        renderList(data.slice(3));

        if (changed) {
            animateTop3();
            animateList();
            animatePoints();

            prevState = data;
        }
    }

    function hasChanged(newData) {
        if (prevState.length !== newData.length) return true;

        for (let i = 0; i < newData.length; i++) {
            if (
                prevState[i].name !== newData[i].name ||
                prevState[i].points !== newData[i].points
            ) {
                return true;
            }
        }

        return false;
    }

    /* 🏆 TOP 3 */
    function renderTop3(t) {
        const el = document.getElementById("top3");
        el.innerHTML = "";

        const map = [
            {d:t[1], cls:"second", icon:"🥈"},
            {d:t[0], cls:"first", icon:"🥇"},
            {d:t[2], cls:"third", icon:"🥉"}
        ];

        map.forEach(m=>{
            if(!m.d) return;

            const div = document.createElement("div");
            div.className = "card "+m.cls;

            div.innerHTML = `
      <h2>${m.icon}</h2>
      <img src="${m.d.logo}">
      <div>${m.d.name}</div>
      <div class="points">${m.d.points}</div>
    `;

            el.appendChild(div);
        });
    }

    /* 📋 LIST */
    function renderList(list) {
        const el = document.getElementById("list");
        el.innerHTML = "";

        list.forEach((t,i)=>{
            const div = document.createElement("div");
            div.className = "row";
            div.id = t.name;

            div.innerHTML = `
      <div class="team">
        <span>${i+4}</span>
        <img src="${t.logo}">
        <span>${t.name}</span>
      </div>
      <div class="points">${t.points}</div>
    `;

            el.appendChild(div);
        });
    }

    function animateList() {
        gsap.from(".row", {
            opacity: 0,
            y: 20,
            duration: 0.4,
            stagger: 0.03,
            ease: "power2.out"
        });
    }

    function animateTop3() {
        gsap.from(".card", {
            scale: 0.8,
            opacity: 0,
            duration: 0.6,
            stagger: 0.1,
            ease: "back.out(1.7)"
        });
    }

    function animatePoints() {
        gsap.fromTo(".points",
            { scale: 1.2, color: "#facc15" },
            { scale: 1, color: "#ffffff", duration: 0.4 }
        );
    }

    setInterval(load, 2000);
    load();

</script>

</body>
</html>
