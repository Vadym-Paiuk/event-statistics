<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<title>Live Табло</title>
	
	<style>
		body { background:#0f172a; color:white; font-family:Arial; }
		
		.row {
			display:flex;
			justify-content:space-between;
			padding:10px;
			margin:5px;
			background:#1e293b;
			border-radius:10px;
			position:relative;
			transition: transform 0.6s ease;
		}
		
		.team {
			display:flex;
			align-items:center;
			gap:10px;
		}
		
		.team img {
			width:40px;
			height:40px;
			border-radius:50%;
		}
	</style>
</head>

<body>

<h1 style="text-align:center;">🏆 LIVE</h1>
<div id="list"></div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

    const API = "https://script.google.com/macros/s/AKfycbyN679clzeACEZWULyHo93KXIhA1yoj8ywL4TdbBo0IgYudD1DCUrL90RKQ5uytA2T3/exec";

    let prev = [];

    async function load() {
        const res = await fetch(API + "?t=" + Date.now());
        const data = await res.json();

        animate(data);
    }

    function animate(data) {
        const container = document.getElementById("list");

        const oldMap = {};
        prev.forEach((t,i) => oldMap[t.name] = i);

        data.forEach((t,i) => {
            let el = document.getElementById(t.name);

            if(!el) {
                el = document.createElement("div");
                el.className = "row";
                el.id = t.name;
                container.appendChild(el);
            }

            el.innerHTML = `
      <div class="team">
        <span>${i+1}</span>
        <img src="${t.logo}">
        <span>${t.name}</span>
      </div>
      <div>${t.points}</div>
    `;

            // анімація переміщення
            if(oldMap[t.name] !== undefined) {
                const diff = oldMap[t.name] - i;
                el.style.transform = `translateY(${diff * 60}px)`;
                setTimeout(() => {
                    el.style.transform = "translateY(0)";
                }, 50);
            }
        });

        // звук якщо змінився порядок
        if(JSON.stringify(prev.map(t=>t.name)) !== JSON.stringify(data.map(t=>t.name))) {
            document.getElementById("sound").play();
        }

        prev = data;
    }

    setInterval(load, 2000);
    load();

</script>

</body>
</html>
